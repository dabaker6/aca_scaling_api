# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-aca-scaling-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: dev246personalwebsite.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_EA53DF1A5E1B4880B58DD8915E5CAB99 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_7D75ED50B2C94EF280E5837805B3CC02 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: dev246personalwebsite.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_EA53DF1A5E1B4880B58DD8915E5CAB99 }}/acascaling.api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA7B716D8F434B7DA471AFF19CAE9C78 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_81350D5302274ABA8428EC4BAD31D1B1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E4920877079C448A925CD6EAFEAACAD7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-aca-scaling-api'
          slot-name: 'Production'
          images: 'dev246personalwebsite.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_EA53DF1A5E1B4880B58DD8915E5CAB99 }}/acascaling.api:${{ github.sha }}'
          