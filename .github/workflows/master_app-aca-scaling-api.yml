# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-aca-scaling-api

on:
  push:
    branches:
      - master
    tags:
      - api-*
 
permissions:
      id-token: write 
      contents: read #This is required for actions/checkout

env:
  ACR_NAME: ${{ secrets.PERSONAL_WEBSITE_ACR_NAME }}
  IMAGE_NAME: ${{ secrets.ACASCALING_API_IMAGE_NAME }}
  IMAGE_TAG: ${{ github.sha }}
  WEBAPP_NAME: ${{ secrets.WEBAPP_NAME }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  IMAGE: "${{ secrets.ACASCALING_API_IMAGE_NAME }}:v1.${{ github.sha }}"
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GITHUB_OIDC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image
        run: |
          az acr login --name $ACR_NAME
          IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
          docker build -t $IMAGE ./aca_scaling_api
          docker push $IMAGE     
      
      - name: Deploy Web App container
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"

          az webapp config container set \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name $IMAGE

      - name: Restart Web App
        run: |
          az webapp restart \
            --name $WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP     
