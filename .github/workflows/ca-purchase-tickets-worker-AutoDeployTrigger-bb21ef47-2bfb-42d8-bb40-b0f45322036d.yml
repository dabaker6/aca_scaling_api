name: Trigger auto deployment for ca-purchase-tickets-worker

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      [ master ]
    tags:
      - worker*
    paths:
    - '**'
    - '.github/workflows/ca-purchase-tickets-worker-AutoDeployTrigger-bb21ef47-2bfb-42d8-bb40-b0f45322036d.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAPURCHASETICKETSWORKER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAPURCHASETICKETSWORKER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAPURCHASETICKETSWORKER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/aca_scaling_worker
          dockerfilePath: Dockerfile
          registryUrl: dev246personalwebsite.azurecr.io
          registryUsername: ${{ secrets.CAPURCHASETICKETSWORKER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAPURCHASETICKETSWORKER_REGISTRY_PASSWORD }}
          containerAppName: ca-purchase-tickets-worker
          resourceGroup: rg-dev-personal-website
          imageToBuild: dev246personalwebsite.azurecr.io/ca-purchase-tickets-worker:${{ github.sha }}
